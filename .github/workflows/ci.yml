name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy app
      - name: Test (pytest)
        run: uv run pytest -q
        env:
          ENV: test

  frontend:
    name: Frontend (eslint · tsc · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Lint (eslint)
        run: pnpm lint
      - name: Type-check (tsc)
        run: pnpm typecheck
      - name: Build (next)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
